<!DOCTYPE html>
<html>

<head>
    <title>Online Consultation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Doctor Consultation</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="records.html">Health Records</a>
        <a href="consultation.html">Consultation</a>
    </nav>

    <div class="container">

        <div class="card">

            <h2>Book Appointment</h2>

            <!-- UPDATED FORM -->
            <form onsubmit="return bookAppointment()">

                <label>Patient Name</label>
                <input type="text" id="patientName" placeholder="Enter Name">

                <label>Select Doctor</label>
                <select id="doctor">
                    <option value="">Select Doctor</option>
                    <option>Dr. Amit Sharma - Cardiologist</option>
                    <option>Dr. Neha Patel - General Physician</option>
                    <option>Dr. Raj Verma - Neurologist</option>
                </select>

                <label>Appointment Date</label>
                <input type="date" id="date">

                <label>Time</label>
                <input type="time" id="time">

                <button type="submit">Book Appointment</button>

            </form>

            <!-- CONFIRMATION MESSAGE -->
            <p id="confirmation" style="margin-top:15px; color:green;"></p>

        </div>

    </div>

    <footer>
        <p>© 2026 E-Health System</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script>

        function bookAppointment() {

            let name = document.getElementById("patientName").value;
            let doctor = document.getElementById("doctor").value;
            let date = document.getElementById("date").value;
            let time = document.getElementById("time").value;

            if (name === "" || doctor === "" || date === "" || time === "") {
                alert("Please fill all details!");
                return false;
            }

            // Show confirmation message
            document.getElementById("confirmation").innerText =
                "Appointment booked successfully with " + doctor +
                " on " + date + " at " + time + ".";

            alert("Appointment Booked Successfully!");

            return false;
        }

    </script>

</body>

</html>
